name: validate

on: push

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate agent frontmatter, references, and fences
        run: node scripts/validate-agents.mjs
      - name: Check .codex/agents tomls are in sync with agents/*.md
        run: node scripts/generate-codex-agents.mjs --check
